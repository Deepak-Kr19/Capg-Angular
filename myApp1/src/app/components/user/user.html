<h2>User List</h2>

<table border="1">
  <tr>
    <th>Name</th>
    <th>Address</th>
    <th>Age</th>
    <th>Gender</th>
  </tr>

  <tr *ngFor="let user of users">
    <td>{{ user.name }}</td>
    <td>{{ user.address }}</td>
    <td>{{ user.age }}</td>
    <td>{{ user.gender }}</td>
  </tr>
</table>
